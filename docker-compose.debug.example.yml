version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketing}
      POSTGRES_USER: ${POSTGRES_USER:-ticketing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticketing}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticketing}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: python -m debugpy --listen 0.0.0.0:5678 manage.py runserver 0.0.0.0:8000 --nothreading --noreload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
      - "5678:5678"
    env_file: .env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RESERVATION_MINUTES: ${RESERVATION_MINUTES:-3}
      EXPIRE_RESERVATIONS_INTERVAL_SECONDS: ${EXPIRE_RESERVATIONS_INTERVAL_SECONDS:-60}
      PROCESS_OUTBOX_INTERVAL_SECONDS: ${PROCESS_OUTBOX_INTERVAL_SECONDS:-30}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: .
    command: python -m debugpy --listen 0.0.0.0:5679 -m celery -A core worker -l info -P solo
    volumes:
      - .:/app
    ports:
      - "5679:5679"
    env_file: .env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RESERVATION_MINUTES: ${RESERVATION_MINUTES:-3}
      EXPIRE_RESERVATIONS_INTERVAL_SECONDS: ${EXPIRE_RESERVATIONS_INTERVAL_SECONDS:-60}
      PROCESS_OUTBOX_INTERVAL_SECONDS: ${PROCESS_OUTBOX_INTERVAL_SECONDS:-30}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  celery_beat:
    build: .
    command: celery -A core beat -l info
    volumes:
      - .:/app
    env_file: .env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RESERVATION_MINUTES: ${RESERVATION_MINUTES:-3}
      EXPIRE_RESERVATIONS_INTERVAL_SECONDS: ${EXPIRE_RESERVATIONS_INTERVAL_SECONDS:-60}
      PROCESS_OUTBOX_INTERVAL_SECONDS: ${PROCESS_OUTBOX_INTERVAL_SECONDS:-30}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery:
        condition: service_started

volumes:
  postgres_data:
